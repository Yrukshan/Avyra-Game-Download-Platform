spring.application.name=backend-test

spring.datasource.url=jdbc:h2:mem:avyra_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

jwt.secret=test-secret-key-for-ci-only-32-chars-minimum
jwt.expiration.ms=86400000

app.downloads.path=./downloads
download.files.path=./downloads

gemini.api.key=test-gemini-api-key
gemini.api.url=https://example.invalid/gemini-test-endpoint

HUGGINGFACE_API_KEY=test-hf-api-key
huggingface.model.llm=test-model
